
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 Not Found</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
      color: #333;
    }

    h1 {
      font-size: 6rem;
      margin: 0;
    }

    p {
      font-size: 1.3rem;
      margin: 10px 0 20px;
    }

    a {
      text-decoration: none;
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      transition: background 0.2s;
    }

    a:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Page not found</p>
  <a href="/election-info">Go Home</a>
</body>
</html>
